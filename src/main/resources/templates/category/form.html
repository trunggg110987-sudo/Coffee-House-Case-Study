<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">

<body>

<div th:fragment="content">

    <div class="mb-3">
        <h3 th:text="${category.id == null ? 'Tạo Danh mục' : 'Chỉnh sửa Danh mục'}"></h3>
        <p class="text-muted">
            Nhập thông tin danh mục để tạo mới hoặc cập nhật dữ liệu.
        </p>
    </div>

    <form th:action="@{/categories/save}" th:object="${category}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Tên Danh mục</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   placeholder="Nhập tên danh mục" />
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
                Lưu
            </button>

            <a href="/categories" class="btn btn-secondary">
                Huỷ
            </a>
        </div>

    </form>

</div>

</body>
</html>
