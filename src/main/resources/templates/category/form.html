<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::section})">

<section>

    <div class="mb-3">
        <h3 th:text="${category.id == null ? 'Create Category' : 'Edit Category'}"></h3>
    </div>

    <form th:action="@{/categories/save}" th:object="${category}" method="post">

        <!-- hidden id (quan trọng để biết edit hay create) -->
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Category Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   placeholder="Enter category name" />
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
                Save
            </button>

            <a href="/categories" class="btn btn-secondary">
                Cancel
            </a>
        </div>

    </form>

</section>

</html>
