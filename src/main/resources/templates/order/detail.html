<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">

<div th:fragment="content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3 p-3 bg-light rounded">

        <div>
            <h3 class="mb-1 fw-bold">
                Chi tiết Order #<span th:text="${order.id}"></span>
            </h3>

            <p class="text-muted mb-0">
                Bàn:
                <span th:text="${order.diningTable != null ? order.diningTable.name : '---'}"></span>
                |
                Trạng thái:
                <span class="badge bg-success"
                      th:text="${order.status != null ? order.status : '---'}"></span>
            </p>
        </div>

        <div>
            <a th:href="@{/orders/list}" class="btn btn-secondary btn-sm">
                ← Quay lại
            </a>
        </div>

    </div>

    <!-- CARD THÊM MÓN -->
    <div class="card shadow-sm mb-3">

        <div class="card-header">
            <strong>Thêm món vào order</strong>
        </div>

        <div class="card-body">

            <form action="/orders/add-item" method="post" class="row g-2">

                <input type="hidden" name="orderId" th:value="${order.id}"/>

                <div class="col-md-6">
                    <select name="productId" class="form-select">
                        <option value="">-- Chọn món --</option>
                        <option th:each="p : ${products}"
                                th:value="${p.id}"
                                th:text="${p.name}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <input type="number"
                           name="quantity"
                           value="1"
                           min="1"
                           class="form-control"/>
                </div>

                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        + Thêm món
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- CARD DANH SÁCH MÓN -->
    <div class="card shadow-sm">

        <div class="card-header">
            <strong>Danh sách món đã gọi</strong>
        </div>

        <div class="card-body">

            <div th:if="${order.orderDetails == null or #lists.isEmpty(order.orderDetails)}"
                 class="alert alert-info text-center mb-0">

                Chưa có món nào trong order.

            </div>

            <div class="table-responsive"
                 th:if="${order.orderDetails != null and !#lists.isEmpty(order.orderDetails)}">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>Món</th>
                        <th class="text-center">Số lượng</th>
                        <th class="text-end">Giá</th>
                        <th class="text-end">Thành tiền</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="d : ${order.orderDetails}">

                        <td th:text="${d.product != null ? d.product.name : '---'}"></td>

                        <td class="text-center" th:text="${d.quantity}"></td>

                        <td class="text-end"
                            th:text="${d.priceAtOrder != null ? #numbers.formatDecimal(d.priceAtOrder,0,'COMMA',0,'POINT') + ' đ' : '0 đ'}">
                        </td>

                        <td class="text-end"
                            th:text="${d.priceAtOrder != null ? #numbers.formatDecimal(d.quantity * d.priceAtOrder,0,'COMMA',0,'POINT') + ' đ' : '0 đ'}">
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

            <!-- TOTAL + ACTION -->
            <div class="d-flex justify-content-between align-items-center mt-3">

                <div>
                    <strong>
                        Tổng tiền:
                        <span th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT') + ' đ' : '0 đ'}">
                        </span>
                    </strong>
                </div>

                <a th:href="@{/payments/checkout/{id}(id=${order.id})}"
                   class="btn btn-success">
                    Thanh toán
                </a>

            </div>

        </div>
    </div>

</div>

</html>
