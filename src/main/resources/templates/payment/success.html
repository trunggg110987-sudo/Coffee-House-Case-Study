<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">

<div th:fragment="content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3 p-3 bg-light rounded">

        <div>
            <h3 class="mb-1 fw-bold text-success">Thanh toán thành công</h3>
            <p class="text-muted mb-0">
                Hóa đơn đã được xử lý hoàn tất
            </p>
        </div>

        <div></div>

    </div>

    <!-- SUCCESS CARD -->
    <div class="card shadow-sm">

        <div class="card-body text-center p-5">

            <!-- ICON -->
            <div class="mb-4">
                <span style="font-size: 60px;">🎉</span>
            </div>

            <!-- MESSAGE -->
            <h4 class="fw-bold text-success mb-3">
                Thanh toán thành công!
            </h4>

            <p class="text-muted mb-4">
                Đơn hàng đã được ghi nhận và cập nhật trạng thái hệ thống.
            </p>

            <!-- ORDER INFO -->
            <div class="mb-4">

                <p class="mb-1">
                    <b>Mã đơn:</b>
                    <span th:text="${order.id}"></span>
                </p>

                <p class="mb-1">
                    <b>Bàn:</b>
                    <span th:text="${order.diningTable != null ? order.diningTable.name : '---'}"></span>
                </p>

                <p class="mb-1">
                    <b>Nhân viên:</b>
                    <span th:text="${order.account != null ? order.account.fullName : '---'}"></span>
                </p>

                <p class="mb-0">
                    <b>Tổng tiền:</b>
                    <span class="text-danger fw-bold"
                          th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT') + ' đ' : '0 đ'}">
                    </span>
                </p>

            </div>

            <!-- BUTTONS -->
            <div class="d-flex justify-content-center gap-2">

                <a th:href="@{/orders/list}"
                   class="btn btn-primary">
                    Quay lại danh sách Order
                </a>

                <a th:href="@{/orders/{id}(id=${order.id})}"
                   class="btn btn-outline-secondary">
                    Xem chi tiết
                </a>

            </div>

        </div>

    </div>

</div>

</html>
