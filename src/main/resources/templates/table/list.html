<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<head>
    <title>Danh sách Bàn</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Quản lý Bàn</h2>
            <p class="text-muted mb-0">Xem danh sách bàn, trạng thái hoạt động và quản lý thông tin bàn.</p>
        </div>
        <a href="/tables/new" class="btn btn-warning rounded-pill px-4 shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> Thêm Bàn Mới
        </a>
    </div>

    <!-- Table List Card -->
    <div class="card p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Tên Bàn</th>
                        <th>Trạng thái</th>
                        <th style="width: 300px;" class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="t : ${tables}">
                        <td class="fw-bold text-muted" th:text="${t.id}">1</td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <span class="d-inline-block rounded-circle bg-light p-2 text-dark border">
                                    <i class="bi bi-grid-3x3-gap-fill text-warning"></i>
                                </span>
                                <span class="fw-semibold text-dark" th:text="${t.name}">Bàn 1</span>
                            </div>
                        </td>
                        <td>
                            <span class="badge rounded-pill px-3 py-2"
                                  th:classappend="${t.status.name() == 'AVAILABLE' ? 'badge-available' : 'badge-occupied'}"
                                  th:text="${t.status.name() == 'AVAILABLE' ? 'Trống' : 'Đang phục vụ'}">
                                Trống
                            </span>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <form th:action="@{/tables/{id}/toggle-status(id=${t.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                                        <i class="bi bi-arrow-repeat me-1"></i>Đổi trạng thái
                                    </button>
                                </form>
                                <a th:href="@{/tables/edit/{id}(id=${t.id})}" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                                    <i class="bi bi-pencil me-1"></i>Sửa
                                </a>
                                <a th:href="@{/tables/delete/{id}(id=${t.id})}" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa bàn này không?')">
                                    <i class="bi bi-trash me-1"></i>Xóa
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tables)}">
                        <td colspan="4" class="text-center text-muted py-4">Chưa có bàn nào được tạo.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
